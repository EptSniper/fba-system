# Hourly Keepa burst collector (DATA_ENGINE_PLAN.md hourly-collector era, Session 54).
#
# Runs scout/collect_hourly.py every hour at :23 (farther from the top-of-hour congestion window).
# A local Windows task calls scripts/dispatch_keepa_collect.ps1 every 45 minutes as the reliable
# dispatcher; that script skips when a run is active or started within 40 minutes. This cron is
# the always-on fallback for when the operator PC is sleeping/off. Both routes land in this SAME
# workflow and therefore share the concurrency group below. The Keepa Pro trickle refills
# 1 token/minute and caps its
# bank at 60 — an overnight-only local run only captures roughly half of that daily generation;
# an hourly burst instead captures ~100% of it. The collector NEVER waits for a token refill —
# it spends only whatever is currently banked (shadow-outcome rechecks first; a hint-led scan
# when the reversible acceleration switch allows it; then backtest history fetches) and exits, typically well under a
# minute. Raw Keepa responses go to the Supabase Storage raw-inbox/ bucket (this runner has no
# persistent disk) — scout/drain_inbox.py, wired into the LOCAL daily housekeeping run, pulls
# them into the real Parquet lake.
#
# MARKETPLACE-ACTION-FREE FROM THE START (the lesson from deal-watch.yml/train-ranker.yml's own
# rewrite, Session 53): plain git (authenticated via the run's own built-in github.token) instead
# of actions/checkout, the runner's preinstalled python3 instead of actions/setup-python, and an
# inline 45-day-guarded git-commit keepalive instead of a marketplace action. Fewer third-party
# dependencies in the security boundary, and immune to the "Repository access blocked"
# account-gate class entirely (nothing here needs to download an action).
#
# Secrets (repo Settings -> Actions): SUPABASE_URL, SUPABASE_SERVICE_KEY, KEEPA_KEY already exist
# from prior sessions. DISCORD_WEBHOOK_SYSTEM_HEALTH for the failure alert.
name: keepa-collect

on:
  schedule:
    - cron: "23 * * * *"   # best-effort cloud fallback; local dispatcher targets 45-minute cadence
  workflow_dispatch: {}    # manual "Run workflow" button

# Never let two bursts overlap — a slow run + the next hour's cron firing before the first
# finishes could double-spend the SAME banked tokens against two concurrent Keepa clients.
concurrency:
  group: keepa-collect
  cancel-in-progress: false

permissions:
  contents: write   # the inline keepalive step below needs to push

jobs:
  keepa-collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Checkout via plain git — no actions/checkout. Fetches the EXACT commit this run is for
      # (github.sha), not just "whatever the branch tip is now". github.token is the run's own
      # built-in GITHUB_TOKEN (auto-masked in logs by the runner) — not a stored secret.
      - name: Checkout (plain git — no marketplace action)
        run: |
          git init -q .
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}"
          git fetch --depth 1 origin "${{ github.sha }}"
          git checkout --quiet FETCH_HEAD

      # ubuntu-latest ships python3 preinstalled — no actions/setup-python needed. --user
      # installs to the runner's user site-packages (importable regardless of PATH, since
      # everything here runs via `python3 script.py` / `python3 -m module`, never a bare
      # console script).
      - name: Install deps (system python3 — no marketplace action)
        env:
          PIP_CACHE_DIR: ${{ github.workspace }}/.pip-cache
        run: |
          python3 --version
          python3 -m pip install --user --disable-pip-version-check -r scout/requirements-collect.txt

      - name: Run the hourly burst collector
        working-directory: scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          KEEPA_KEY: ${{ secrets.KEEPA_KEY }}
          DATALAKE_CLOUD_INBOX: "1"   # datalake.flush() uploads to raw-inbox/ instead of local Parquet
        run: python3 collect_hourly.py

      # Same failure-alert convention as deal-watch.yml/train-ranker.yml: a silent hourly
      # failure gets noticed. Never echoes an env value; redact.py + Actions' own secret
      # masking both apply.
      #
      # Keepa throughput plan Action A (2026-07-11, live-reproduced): `if: failure()` alone
      # NEVER fires on a job-timeout cancellation — GitHub Actions reports a killed step as
      # `cancelled`, not `failure`, and `failure()` evaluates false for it. This is exactly
      # what happened on 2026-07-06/07-07: 11 runs were silently killed at the 10-minute job
      # timeout (a slow-Trends-reads hang, since fixed — 7f46224's SAFE_DEADLINE_SECONDS wall
      # clock now exits cleanly well before that point) and NOT ONE of them posted an alert,
      # losing up to 60 banked tokens (~55 ASINs) per silent miss. `cancelled()` closes that
      # gap so ANY future hang — for any reason — gets noticed instead of just losing tokens
      # quietly.
      - name: Alert on failure or cancellation
        if: failure() || cancelled()
        env:
          DISCORD_WEBHOOK_SYSTEM_HEALTH: ${{ secrets.DISCORD_WEBHOOK_SYSTEM_HEALTH }}
          RUN_OUTCOME: ${{ job.status }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request
          url = os.getenv("DISCORD_WEBHOOK_SYSTEM_HEALTH")
          outcome = os.getenv("RUN_OUTCOME", "unknown")
          if url:
              if outcome == "cancelled":
                  desc = ("scout/collect_hourly.py was CANCELLED (likely the 10-minute job "
                          "timeout) before it could exit cleanly — any banked tokens spent "
                          "this run may be lost. Check the run log (secrets are masked).")
              else:
                  desc = ("scout/collect_hourly.py exited non-zero in GitHub Actions. Check "
                          "the run log (secrets are masked).")
              body = {"embeds": [{"title": "⚠ Hourly Keepa collector failed",
                                  "description": desc, "color": 0xE24C4C}]}
              req = urllib.request.Request(url, data=json.dumps(body).encode(),
                                          headers={"Content-Type": "application/json"})
              try:
                  urllib.request.urlopen(req, timeout=10)
              except Exception as e:
                  print("failure alert post failed:", type(e).__name__)
          PY

      # Defeat GitHub's 60-day-inactivity auto-disable of scheduled workflows — inline, no
      # marketplace action (same pattern as deal-watch.yml/train-ranker.yml).
      - name: Keepalive (inline — no marketplace action)
        run: |
          DAYS_SINCE=$(( ($(date +%s) - $(git log -1 --format=%ct)) / 86400 ))
          echo "days since last commit: $DAYS_SINCE"
          if [ "$DAYS_SINCE" -ge 45 ]; then
            mkdir -p .github
            echo "keepalive: $(date -u +%Y-%m-%dT%H:%M:%SZ) (repo was ${DAYS_SINCE}d inactive)" > .github/keepalive.txt
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .github/keepalive.txt
            git commit -q -m "chore: keepalive (repo inactive ${DAYS_SINCE}d — defeat 60-day Actions auto-disable)"
            git push origin "HEAD:${{ github.ref_name }}"
          else
            echo "keepalive: not needed yet (${DAYS_SINCE}d < 45d threshold)"
          fi
