# Top-100 deal watch — the free nightly cloud runner (TOP100_DEAL_WATCH_PLAN.md T2).
# Runs scout/deals/run_watch.py at 9 PM America/New_York, year-round, on GitHub's free tier
# (~8% of the 2,000 free Linux minutes/month). Your PC stays irrelevant — state is in Supabase,
# alerts in Discord.
#
# ONE-TIME SETUP is a human step (repo must exist + secrets added): see HUMAN_TODO.md
# "GitHub deal-watch cloud runner". Until that's done this workflow is inert (it only runs in a
# repo that has the secrets).
name: deal-watch

on:
  # GitHub cron is UTC-only, so schedule BOTH candidate UTC hours for 9 PM ET and let the first
  # step exit unless it's actually 21:00 in New York — one ~10-second no-op run/day, exact 9 PM
  # in both EST (UTC-5 -> 02:17 UTC) and EDT (UTC-4 -> 01:17 UTC). The :17 offset dodges the
  # documented top-of-hour scheduling congestion.
  schedule:
    - cron: "17 1 * * *"
    - cron: "17 2 * * *"
  workflow_dispatch: {}   # manual "Run workflow" button for the end-to-end verification run

# Never let two runs overlap (a slow run + the next cron) — that could double-post the digest.
concurrency:
  group: deal-watch
  cancel-in-progress: false

# MARKETPLACE-ACTION-FREE (2026-07-06): a "Repository access blocked" GitHub account-level gate
# was seen blocking action downloads (actions/checkout, actions/setup-python, third-party
# actions) before any of our own steps could run. Rather than wait on that gate, every step
# below avoids `uses:` entirely — plain git (authenticated via the built-in github.token, never
# a stored secret) + the ubuntu-latest runner's preinstalled python3. This also just means fewer
# third-party dependencies in the security boundary going forward, gate or no gate.
permissions:
  contents: write   # write (not just read) — the inline keepalive step below needs to push

jobs:
  deal-watch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Gate to exactly 9 PM America/New_York
        id: gate
        run: |
          HOUR=$(TZ=America/New_York date +%H)
          echo "New York hour: $HOUR"
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ "$HOUR" != "21" ]; then
            echo "Not 9 PM ET (hour=$HOUR) and not a manual dispatch — exiting cleanly."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      # Checkout via plain git — no actions/checkout. Fetches the EXACT commit this run is
      # for (github.sha), not just "whatever the branch tip is right now" (avoids a race if a
      # push lands between trigger and fetch). github.token is the run's own built-in
      # GITHUB_TOKEN (auto-masked in logs by the runner) — not a stored/rotatable secret.
      - name: Checkout (plain git — no marketplace action)
        if: steps.gate.outputs.run == 'true'
        run: |
          git init -q .
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}"
          git fetch --depth 1 origin "${{ github.sha }}"
          git checkout --quiet FETCH_HEAD

      # ubuntu-latest ships python3 preinstalled — no actions/setup-python needed. --user
      # installs to the runner's user site-packages (importable regardless of PATH, since these
      # deps are only ever used via `python3 -m ...`/`python3 script.py`, never a bare console
      # script). PIP_CACHE_DIR just gives pip a defined cache location for THIS run — dropping
      # actions/setup-python's cache: pip also drops its CROSS-RUN caching (that used
      # actions/cache under the hood, another marketplace action); each run reinstalls from
      # PyPI, a fair tradeoff for the marketplace-action-free goal.
      - name: Install minimal deps (system python3 — no marketplace action)
        if: steps.gate.outputs.run == 'true'
        env:
          PIP_CACHE_DIR: ${{ github.workspace }}/.pip-cache
        run: |
          python3 --version
          python3 -m pip install --user --disable-pip-version-check -r scout/requirements-dealwatch.txt

      - name: Run the deal watch
        if: steps.gate.outputs.run == 'true'
        working-directory: scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DISCORD_WEBHOOK_RETAIL_DEALS: ${{ secrets.DISCORD_WEBHOOK_RETAIL_DEALS }}
          DISCORD_WEBHOOK_SYSTEM_HEALTH: ${{ secrets.DISCORD_WEBHOOK_SYSTEM_HEALTH }}
          WOOT_API_KEY: ${{ secrets.WOOT_API_KEY }}
          BESTBUY_API_KEY: ${{ secrets.BESTBUY_API_KEY }}
          HEALTHCHECK_URL_DEALWATCH: ${{ secrets.HEALTHCHECK_URL_DEALWATCH }}
        run: python3 -m deals.run_watch

      # If the run failed, post a short redacted alert to #system-health so a silent nightly
      # failure gets noticed. redact.py + Actions' own secret masking both apply; the step never
      # echoes an env value.
      - name: Alert on failure
        if: failure() && steps.gate.outputs.run == 'true'
        working-directory: scout
        env:
          DISCORD_WEBHOOK_SYSTEM_HEALTH: ${{ secrets.DISCORD_WEBHOOK_SYSTEM_HEALTH }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request
          url = os.getenv("DISCORD_WEBHOOK_SYSTEM_HEALTH")
          if url:
              body = {"embeds": [{"title": "⚠ Deal watch failed",
                                  "description": "scout/deals/run_watch.py exited non-zero in GitHub Actions. Check the run log (secrets are masked).",
                                  "color": 0xE24C4C}]}
              req = urllib.request.Request(url, data=json.dumps(body).encode(),
                                          headers={"Content-Type": "application/json"})
              try:
                  urllib.request.urlopen(req, timeout=10)
              except Exception as e:
                  print("failure alert post failed:", type(e).__name__)
          PY

      # Defeat GitHub's 60-day-inactivity auto-disable of scheduled workflows, without the
      # gautamkrishnar/keepalive-workflow marketplace action: check the age of the last commit
      # ourselves and only push a trivial keepalive commit when actually needed (45-day guard,
      # not every run). contents: write above is specifically for this push.
      - name: Keepalive (inline — no marketplace action)
        if: steps.gate.outputs.run == 'true'
        run: |
          DAYS_SINCE=$(( ($(date +%s) - $(git log -1 --format=%ct)) / 86400 ))
          echo "days since last commit: $DAYS_SINCE"
          if [ "$DAYS_SINCE" -ge 45 ]; then
            mkdir -p .github
            echo "keepalive: $(date -u +%Y-%m-%dT%H:%M:%SZ) (repo was ${DAYS_SINCE}d inactive)" > .github/keepalive.txt
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .github/keepalive.txt
            git commit -q -m "chore: keepalive (repo inactive ${DAYS_SINCE}d — defeat 60-day Actions auto-disable)"
            git push origin "HEAD:${{ github.ref_name }}"
          else
            echo "keepalive: not needed yet (${DAYS_SINCE}d < 45d threshold)"
          fi
