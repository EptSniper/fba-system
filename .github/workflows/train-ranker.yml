# Ranker training — the free cloud trainer (DATA_ENGINE_PLAN.md V3 shadow loop).
# Runs scout/train_ranker.py every HOUR at :41 past (2026-07-07 review: tightened from every 6h
# to match keepa-collect.yml's own hourly cadence — Mehmet wants training checked every time the
# collector might have added new rows, not lagging behind it by up to 6h). The :41 off-hour
# offset dodges GitHub's top-of-hour scheduling congestion and keeps clear of keepa-collect.yml's
# own :07 offset, same convention as every other scheduled workflow in this repo. Pulls training
# rows from Supabase, trains the challenger, evaluates it against the deterministic triage
# champion on a by-ASIN split, appends learning-hub/tracking/ranker-report.md (in the runner
# only — the repo copy is updated by local runs), posts the summary to #brain-proposals, and
# uploads the model to the Supabase storage bucket models/ (ranker/<date>/ + stable
# ranker/current/) so the local pipeline fetches the current champion at run start (the sole
# distribution channel — no GitHub-hosted workflow-artifact copy; see the
# marketplace-action-free note below).
#
# SKIP-IF-UNCHANGED (Session 55) is what makes hourly safe/cheap: most hourly ticks won't have
# new labeled data yet (a collector burst might add 0-few rows, or none if the bank was empty).
# train_ranker.py fingerprints the training set (row count + a content hash) before training and
# compares it to the last run's, stored at ranker/current/fingerprint.json next to the model.
# Unchanged -> exits 0 with a one-line "no new data — skipped" log, no Discord post, no model
# fit, no wasted compute. Changed (or first-ever run) -> trains and posts exactly as before. This
# is deliberately NOT removed/bypassed for the hourly cadence — training on a handful of
# identical rows every hour would be pure waste; checking hourly and training only when there's
# genuinely something new is the actual goal.
#
# PROMOTION IS HUMAN-ONLY regardless of where training ran: train_ranker.py never writes
# ai-brain.json (test-enforced); the champion flips only when Mehmet sets the brain key
# scoring.rankingChampion via fba-brain-updater.
#
# Secrets (repo Settings -> Actions): SUPABASE_URL + SUPABASE_SERVICE_KEY exist from T2.
# DISCORD_WEBHOOK_BRAIN_PROPOSALS + DISCORD_WEBHOOK_SYSTEM_HEALTH must exist too — add them if
# the summary post logs "no webhook" (train_ranker degrades to an honest no-post, never fails).
name: train-ranker

on:
  schedule:
    - cron: "41 * * * *"   # hourly at :41
  workflow_dispatch: {}     # manual "Run workflow" button

# Never let two trainings overlap (a slow run + the next cron) — same T2 rule: overlapping runs
# could double-post the proposal and race the ranker/current/ upload.
concurrency:
  group: train-ranker
  cancel-in-progress: false

# MARKETPLACE-ACTION-FREE (2026-07-06): a "Repository access blocked" GitHub account-level gate
# was seen blocking action downloads (actions/checkout, actions/setup-python, actions/
# upload-artifact, third-party actions) before any of our own steps could run. Rather than wait
# on that gate, every step below avoids `uses:` entirely — plain git (authenticated via the
# built-in github.token, never a stored secret) + the ubuntu-latest runner's preinstalled
# python3. The workflow-artifact upload is dropped outright (Supabase storage — see
# train_ranker.py's upload_to_storage() — is already the real distribution channel; the
# artifact copy was only ever a human/debugging convenience). This also just means fewer
# third-party dependencies in the security boundary going forward, gate or no gate.
permissions:
  contents: write   # write (not just read) — the inline keepalive step below needs to push

jobs:
  train-ranker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # Checkout via plain git — no actions/checkout. Fetches the EXACT commit this run is
      # for (github.sha), not just "whatever the branch tip is right now" (avoids a race if a
      # push lands between trigger and fetch). github.token is the run's own built-in
      # GITHUB_TOKEN (auto-masked in logs by the runner) — not a stored/rotatable secret.
      - name: Checkout (plain git — no marketplace action)
        run: |
          git init -q .
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}"
          git fetch --depth 1 origin "${{ github.sha }}"
          git checkout --quiet FETCH_HEAD

      # ubuntu-latest ships python3 preinstalled — no actions/setup-python needed. --user
      # installs to the runner's user site-packages (importable regardless of PATH, since these
      # deps are only ever used via `python3 script.py`, never a bare console script).
      # PIP_CACHE_DIR just gives pip a defined cache location for THIS run — dropping
      # actions/setup-python's cache: pip also drops its CROSS-RUN caching (that used
      # actions/cache under the hood, another marketplace action); each run reinstalls from
      # PyPI, a fair tradeoff for the marketplace-action-free goal.
      - name: Install minimal deps (system python3 — no marketplace action)
        env:
          PIP_CACHE_DIR: ${{ github.workspace }}/.pip-cache
        run: |
          python3 --version
          python3 -m pip install --user --disable-pip-version-check -r scout/requirements-train.txt

      - name: Train + evaluate (champion/challenger)
        working-directory: scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DISCORD_WEBHOOK_BRAIN_PROPOSALS: ${{ secrets.DISCORD_WEBHOOK_BRAIN_PROPOSALS }}
          RANKER_OUT_DIR: ${{ github.workspace }}/ranker-out
        run: python3 train_ranker.py

      # Same failure alert as deal-watch.yml: a silent nightly training failure gets noticed.
      - name: Alert on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_SYSTEM_HEALTH: ${{ secrets.DISCORD_WEBHOOK_SYSTEM_HEALTH }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request
          url = os.getenv("DISCORD_WEBHOOK_SYSTEM_HEALTH")
          if url:
              body = {"embeds": [{"title": "⚠ Ranker training failed",
                                  "description": "scout/train_ranker.py exited non-zero in GitHub Actions. Check the run log (secrets are masked). NOTE: an honest 'refused: not enough data' exits 0 and does NOT trigger this.",
                                  "color": 0xE24C4C}]}
              req = urllib.request.Request(url, data=json.dumps(body).encode(),
                                          headers={"Content-Type": "application/json"})
              try:
                  urllib.request.urlopen(req, timeout=10)
              except Exception as e:
                  print("failure alert post failed:", type(e).__name__)
          PY

      # Defeat GitHub's 60-day-inactivity auto-disable of scheduled workflows, without the
      # gautamkrishnar/keepalive-workflow marketplace action: check the age of the last commit
      # ourselves and only push a trivial keepalive commit when actually needed (45-day guard,
      # not every run). contents: write above is specifically for this push.
      - name: Keepalive (inline — no marketplace action)
        run: |
          DAYS_SINCE=$(( ($(date +%s) - $(git log -1 --format=%ct)) / 86400 ))
          echo "days since last commit: $DAYS_SINCE"
          if [ "$DAYS_SINCE" -ge 45 ]; then
            mkdir -p .github
            echo "keepalive: $(date -u +%Y-%m-%dT%H:%M:%SZ) (repo was ${DAYS_SINCE}d inactive)" > .github/keepalive.txt
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .github/keepalive.txt
            git commit -q -m "chore: keepalive (repo inactive ${DAYS_SINCE}d — defeat 60-day Actions auto-disable)"
            git push origin "HEAD:${{ github.ref_name }}"
          else
            echo "keepalive: not needed yet (${DAYS_SINCE}d < 45d threshold)"
          fi
